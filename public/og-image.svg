<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A5B8A"/>
      <stop offset="100%" stop-color="#3A3C6E"/>
    </linearGradient>
  </defs>

  {/* 背景 */}
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  {/* Logo图形 */}
  <g transform="translate(540, 215) scale(4)">
    <path
      d="M32 8C19.163 8 8 19.163 8 32s11.163 24 24 24"
      stroke="url(#logoGradient)"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />
    <path
      d="M32 56c12.837 0 24-11.163 24-24S44.837 8 32 8"
      stroke="url(#logoGradient)"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />
    <circle cx="32" cy="32" r="6" fill="url(#logoGradient)"/>
    <circle cx="32" cy="32" r="3" fill="#A5C1D6"/>
  </g>

  {/* 品牌名称 */}
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle">相逢</text>

  {/* 标语 */}
  <text x="600" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle">致敬全球思考者</text>
</svg>
