<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>验证您的邮箱 - 相逢</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#F7F9FC; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <!-- 主容器 -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F7F9FC;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <!-- 内容卡片 -->
        <table role="presentation" width="100%" max-width="400" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:12px; box-shadow:0 2px 8px rgba(58,60,110,0.08); max-width:400px; width:100%;">
          
          <!-- Header: 品牌 -->
          <tr>
            <td style="padding:32px 24px 16px; text-align:center; border-bottom:1px solid #E1E4EA;">
              <h1 style="margin:0; font-family:Georgia, 'Noto Serif SC', serif; font-size:24px; color:#3A3C6E; letter-spacing:3px; font-weight:700;">相逢</h1>
              <p style="margin:6px 0 0; font-size:13px; color:#6A5B8A; font-family:system-ui, -apple-system, sans-serif;">不止相遇，更是改变</p>
            </td>
          </tr>
          
          <!-- Body: 内容 -->
          <tr>
            <td style="padding:32px 24px;">
              <h2 style="margin:0 0 16px; font-size:18px; color:#25263D; font-family:system-ui, -apple-system, sans-serif; font-weight:600;">验证您的邮箱</h2>
              
              <p style="margin:0 0 24px; font-size:15px; color:#25263D; line-height:1.6; font-family:system-ui, -apple-system, sans-serif;">
                欢迎加入相逢！请点击下方按钮验证您的邮箱地址，开启深度之旅。
              </p>
              
              <!-- 按钮 -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding:8px 0 24px;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block; padding:14px 32px; background-color:#6A5B8A; color:#ffffff; text-decoration:none; border-radius:8px; font-size:15px; font-weight:600; font-family:system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color:transparent;">
                      验证邮箱
                    </a>
                  </td>
                </tr>
              </table>
              
              <p style="margin:0 0 12px; font-size:13px; color:#8C8EA9; line-height:1.5; font-family:system-ui, -apple-system, sans-serif;">
                如果按钮无法点击，请复制以下链接到浏览器打开：
              </p>
              
              <p style="margin:0; font-size:12px; color:#6A5B8A; word-break:break-all; line-height:1.5; font-family:system-ui, -apple-system, sans-serif;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>
          
          <!-- 安全提示 -->
          <tr>
            <td style="padding:0 24px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F7F9FC; border-radius:8px;">
                <tr>
                  <td style="padding:16px;">
                    <p style="margin:0; font-size:12px; color:#8C8EA9; line-height:1.5; font-family:system-ui, -apple-system, sans-serif;">
                      <strong style="color:#6A5B8A;">安全提示：</strong>此链接将在24小时后过期。如非您本人操作，请忽略此邮件。
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Footer -->
          <tr>
            <td style="padding:20px 24px; text-align:center; border-top:1px solid #E1E4EA; background-color:#F7F9FC; border-radius:0 0 12px 12px;">
              <p style="margin:0 0 4px; font-size:12px; color:#8C8EA9; font-family:system-ui, -apple-system, sans-serif;">
                此邮件由 相逢 自动发送
              </p>
              <p style="margin:0; font-size:11px; color:#8C8EA9; font-family:system-ui, -apple-system, sans-serif;">
                © 2026 相逢. All rights reserved.
              </p>
            </td>
          </tr>
          
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
